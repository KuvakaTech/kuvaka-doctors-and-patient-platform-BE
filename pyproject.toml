[tool.ruff]
line-length = 99
target-version = "py313"
exclude = ["*/migrations/*"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "DJ", "C4"]
ignore = ["DJ001"]

[tool.ruff.lint.per-file-ignores]
# Inline HTML email template — markup lines naturally exceed the line-length
# limit; wrapping mid-attribute would hurt readability more than it helps.
"apps/users/otp_service.py" = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["apps", "config"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.test"
python_files = ["test_*.py", "*_test.py", "tests.py"]
addopts = "--reuse-db"
